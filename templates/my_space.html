<!DOCTYPE html>
<html>

<head>
    <title>My Space</title>
    <link rel="stylesheet" href="/static/style.css?v=50">
</head>

<body>

    <div class="container">

        <div class="navbar">

            <a href="/ui" class="btn">
                ← Home
            </a>

            <h2 id="usernameText">
                Hey User
            </h2>

        </div>

        <div class="hero">

            <h1>My Book Space</h1>

            <p>
                Manage your uploaded books and see what readers think about them.
            </p>

        </div>

        <div style="
        display:flex;
        gap:15px;
        margin-bottom:30px;
    ">

            <button class="btn" onclick="showMyBooks()">
                📚 Your Books
            </button>

            <button class="btn" onclick="showMyReviews()">
                ⭐ Reviews
            </button>

        </div>

        <div class="book-grid" id="contentArea"></div>

    </div>

    <script>

        const token = localStorage.getItem("token")

        if (!token) {
            window.location.href = "/login-page"
        }

        async function loadUser() {

            const response = await fetch(
                "http://127.0.0.1:8000/me",
                {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            )

            const data = await response.json()

            document.getElementById("usernameText").innerText =
                `Hey ${data.username}`
        }


        async function showMyBooks() {

            const response = await fetch(
                "http://127.0.0.1:8000/my-books",
                {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            )

            const books = await response.json()

            const container = document.getElementById("contentArea")

            container.innerHTML = ""

            if (books.length === 0) {

                container.innerHTML = `
            <div class="book-card">
                <h2>No books uploaded yet</h2>
                <p>Add your first book and start collecting reviews.</p>
            </div>
        `

                return
            }

            books.forEach(book => {

                container.innerHTML += `
            <div class="book-card">

                <h2>${book.title}</h2>

                <p><strong>Author:</strong> ${book.author}</p>

                <p><strong>Genre:</strong> ${book.genre}</p>

                <p>${book.summary}</p>

                <a class="btn" href="/book/${book.id}">
                    View Details
                </a>

            </div>
        `
            })
        }


        async function showMyReviews() {

            const response = await fetch(
                "http://127.0.0.1:8000/my-book-reviews",
                {
                    headers: {
                        "Authorization": `Bearer ${token}`
                    }
                }
            )

            const reviews = await response.json()

            const container = document.getElementById("contentArea")

            container.innerHTML = ""

            if (reviews.length === 0) {

                container.innerHTML = `
            <div class="book-card">
                <h2>No reviews yet</h2>
                <p>Reviews from readers will appear here.</p>
            </div>
        `

                return
            }

            reviews.forEach(review => {

                container.innerHTML += `
            <div class="book-card">

                <h2>${review.book_title}</h2>

                <h3>⭐ ${review.rating}/5</h3>

                <p>${review.comment}</p>

                <p>
                    <strong>Reviewed by:</strong>
                    ${review.username}
                </p>

                <p style="color:#64748b;">
                    ${review.time ? review.time : "Time not available"}
                </p>
            </div>
        `
            })
        }

        loadUser()
        showMyBooks()

    </script>

</body>

</html>
